<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Information Web</title>
    <style>
        /* Reset basic styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Switch UI */
        .switch {
        position: relative;
        display: inline-block;
        width: 50px;
        height: 26px;
        }

        .switch input {
        display: none;
        }

        .slider {
        position: absolute;
        cursor: pointer;
        top: 0; left: 0;
        right: 0; bottom: 0;
        background-color: #ccc;
        transition: 0.4s;
        border-radius: 34px;
        }

        .slider:before {
        position: absolute;
        content: "";
        height: 18px;
        width: 18px;
        left: 4px;
        bottom: 4px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
        }

        /* ON state */
        input:checked + .slider {
        background-color: #3b82f6;
        }

        input:checked + .slider:before {
        transform: translateX(24px);
        }

        /* Dark mode styles */
        body.dark {
        background-color: #111827;
        color: white;
        }

        body.dark .country-card {
        background-color: #1f2937;
        color: white;
        }

        body.dark #country-name {
        color: #e5e7eb;
        }
        body.dark .info {
        background-color: #374151;
        color: white;
        }

        body.dark .info strong {
            color: white;
        }

        body.dark .info span {
            font-weight: 500;
            color: white;
        }


        body {
            background-color: #eef2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        /* Search Box Styling */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: #3b82f6;
        }

        .search-box button {
            padding: 12px 20px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .search-box button:hover {
            background-color: #2563eb;
        }

        /* Country Card Styling */
        .country-card {
            background-color: white;
            border-radius: 16px;
            padding: 30px 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        #country-name {
            margin-bottom: 20px;
            font-size: 28px;
            color: #1f2937;
        }

        #country-flag {
            width: 70px;
            height: auto;
            max-height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 1px solid black;
        }

        /* Information Layout */
        .info {
            text-align: left;
            background-color: #f9fafb;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #f3f4f6;
        }

        .info p {
            margin-bottom: 12px;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
        }

        .info p:last-child {
            margin-bottom: 0;
        }

        .info strong {
            color: #4b5563;
        }

        .info span {
            font-weight: 500;
            color: #111827;
        }
    </style>
</head>
<body>

    <div class="container">
        <label class="switch">
            <input type="checkbox" id="theme-toggle">
            <span class="slider"></span>
        </label>
        <div class="search-box">
            <input type="text" id="country-input" placeholder="Enter a country name...">
            <button id="search-btn">Search</button>
        </div>

        <div class="country-card" id="country-card">
            <h2 id="country-name">Country Name</h2>
            
            <img id="country-flag" src="https://placehold.co/150x100?text=Country+Flag" alt="Country Flag">

            <div class="info">
                <p><strong>Capital:</strong> <span id="capital">---</span></p>
                <p><strong>Population:</strong> <span id="population">---</span></p>
                <p><strong>Region:</strong> <span id="region">---</span></p>
                <p><strong>Currency:</strong> <span id="currency">---</span></p>
                <p><strong>Language:</strong> <span id="language">---</span></p>
            </div>
        </div>
    </div>
    <script>
        const API_KEY = "https://restcountries.com/v3.1/name/";

        let countryName = document.querySelector("#country-name");
        let countryFlag = document.querySelector("#country-flag");
        let capital = document.querySelector("#capital");
        let population = document.querySelector("#population");
        let region = document.querySelector("#region");
        let currency = document.querySelector("#currency");
        let language = document.querySelector("#language");

        const getFlag = (country) => {
            countryFlag.src = `https://flagsapi.com/${country}/flat/64.png`;
        }

        const getCountryInfo = async (country) => {
            console.log("Fetching country information...");
            const URL = `https://restcountries.com/v3.1/name/${country}`;
            let response = await fetch(URL);
            console.log(response);

            let data = await response.json();
            countryName.innerHTML = data[0].name.common;
            capital.innerHTML = data[0].capital[0];
            population.innerHTML = data[0].population.toLocaleString();
            region.innerHTML = data[0].region;
            currency.innerHTML = Object.keys(data[0].currencies)[0];
            language.innerHTML = Object.values(data[0].languages)[0];
            getFlag(data[0].cca2);
        };

        const input = document.querySelector("#country-input");
        const btn = document.querySelector("#search-btn");

        btn.addEventListener("click", () => {
            const country = input.value;
            getCountryInfo(country);
        });

        const themeToggle = document.querySelector("#theme-toggle");
        themeToggle.addEventListener("change", () => {
            document.body.classList.toggle("dark");
        });
    </script>
</body>
</html>
